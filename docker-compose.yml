name: leadgen-ai

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: /api
    expose:
      - "3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - leadgen

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/api-gateway
    environment:
      SERVICE_NAME: api-gateway
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      IDENTITY_SERVICE_URL: http://identity-service:8000
      LEADGEN_SERVICE_URL: http://leadgen-service:8000
      LEADSTORE_SERVICE_URL: http://leadstore-service:8000
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      leadgen-service:
        condition: service_healthy
      leadstore-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  identity-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/identity-service
    environment:
      SERVICE_NAME: identity-service
      IDENTITY_DATABASE_URL: postgresql+psycopg://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      JWT_ACCESS_SECRET: replace-with-a-strong-access-secret
      JWT_REFRESH_SECRET: replace-with-a-strong-refresh-secret
      JWT_ACCESS_EXPIRES_MINUTES: 30
      JWT_REFRESH_EXPIRES_DAYS: 7
      BOOTSTRAP_ADMIN_EMAIL: ""
      BOOTSTRAP_ADMIN_PASSWORD: ""
      BOOTSTRAP_ADMIN_NAME: ""
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  leadgen-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/leadgen-service
    environment:
      SERVICE_NAME: leadgen-service
      ENVIRONMENT: local
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      LEADGEN_DATABASE_URL: postgresql+psycopg://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PIPELINE_RUN_QUEUE: pipeline.run
      PIPELINE_RUN_TASK_NAME: pipeline.process_run
      LEADGEN_ALLOW_MOCK_USER: "true"
      LEADGEN_MOCK_USER_ID: 00000000-0000-4000-8000-000000000001
      LEADGEN_MOCK_USER_EMAIL: mvp-user@example.com
      LEADGEN_MOCK_USER_ROLE: user
      LEADGEN_CREDIT_UNITS_PER_LEAD: 1
      OPENAI_API_KEY: replace-with-openai-key
      FIRECRAWL_API_KEY: replace-with-firecrawl-key
      OLLAMA_BASE_URL: http://ollama:11434
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  pipeline-worker:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/pipeline-worker
    environment:
      SERVICE_NAME: pipeline-worker
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PIPELINE_RUN_QUEUE: pipeline.run
      PIPELINE_RUN_TASK_NAME: pipeline.process_run
      PIPELINE_STEP_DELAY_SECONDS: 0.25
      PIPELINE_SIMULATE_FAIL_STEP: ""
      LEADGEN_SERVICE_URL: http://leadgen-service:8000
      LEADSTORE_SERVICE_URL: http://leadstore-service:8000
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=pipeline.run", "--hostname=pipeline-worker@%h"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      leadgen-service:
        condition: service_healthy
      leadstore-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app:celery_app inspect ping --timeout=8 | grep -q pong"]
      interval: 10s
      timeout: 12s
      retries: 5
      start_period: 30s
    networks:
      - leadgen

  leadstore-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/leadstore-service
    environment:
      SERVICE_NAME: leadstore-service
      ENVIRONMENT: local
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      LEADSTORE_DATABASE_URL: postgresql+psycopg://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      LEADSTORE_ALLOW_MOCK_USER: "true"
      LEADSTORE_MOCK_USER_ID: 00000000-0000-4000-8000-000000000001
      LEADSTORE_MOCK_USER_EMAIL: mvp-user@example.com
      LEADSTORE_MOCK_USER_ROLE: user
      CLOUDFLARE_R2_BUCKET: replace-with-r2-bucket
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: leadgen_password
      POSTGRES_DB: leadgen
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen -d leadgen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - leadgen

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api-gateway:
        condition: service_healthy
    networks:
      - leadgen

networks:
  leadgen:
    driver: bridge

volumes:
  postgres-data:
