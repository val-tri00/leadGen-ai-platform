name: leadgen-ai

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: /api
    expose:
      - "3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - leadgen

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/api-gateway
    environment:
      SERVICE_NAME: api-gateway
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      IDENTITY_SERVICE_URL: http://identity-service:8000
      LEADGEN_SERVICE_URL: http://leadgen-service:8000
      LEADSTORE_SERVICE_URL: http://leadstore-service:8000
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      leadgen-service:
        condition: service_healthy
      leadstore-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  identity-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/identity-service
    environment:
      SERVICE_NAME: identity-service
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: replace-with-a-strong-secret
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  leadgen-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/leadgen-service
    environment:
      SERVICE_NAME: leadgen-service
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: replace-with-openai-key
      FIRECRAWL_API_KEY: replace-with-firecrawl-key
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  pipeline-worker:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/pipeline-worker
    environment:
      SERVICE_NAME: pipeline-worker
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      LEADGEN_SERVICE_URL: http://leadgen-service:8000
      LEADSTORE_SERVICE_URL: http://leadstore-service:8000
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      leadgen-service:
        condition: service_healthy
      leadstore-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  leadstore-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/leadstore-service
    environment:
      SERVICE_NAME: leadstore-service
      DATABASE_URL: postgresql://leadgen:leadgen_password@postgres:5432/leadgen
      REDIS_URL: redis://redis:6379/0
      CLOUDFLARE_R2_BUCKET: replace-with-r2-bucket
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: leadgen_password
      POSTGRES_DB: leadgen
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen -d leadgen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leadgen

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - leadgen

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api-gateway:
        condition: service_healthy
    networks:
      - leadgen

networks:
  leadgen:
    driver: bridge

volumes:
  postgres-data:
